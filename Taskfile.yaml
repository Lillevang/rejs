# https://taskfile.dev

version: "3"

vars:
  IMAGE: ghcr.io/lillevang/rejs
  TAG_FILE: .version
  TAG:
    sh: cat .version
  RUNTIME:
    sh: command -v podman >/dev/null 2>&1 && echo podman || echo docker
  # Vite inlines VITE_* at build time, so the shortener origin must be baked in
  # here. Must stay in sync with the CSP connect-src host in
  # security-headers.inc, or the browser blocks the mint request.
  SHORTENER_URL: '{{.SHORTENER_URL | default "https://s.lvang.dev"}}'
  # Private key + password live only in 1Password — never on disk, never in CI.
  OP_ITEM: '{{.OP_ITEM | default "op://Personal/cosign"}}'

tasks:
  bump:
    desc: Bump version (patch, minor, major)
    vars:
      TARGET: '{{.TARGET | default "patch"}}'
    cmds:
      - |
        CURRENT=$(cat {{.TAG_FILE}})
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        case "{{.TARGET}}" in
         patch) PATCH=$((PATCH+1));;
         minor) MINOR=$((MINOR+1)); PATCH=0;;
         major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;;
         *) echo "Unknown bump target: {{.TARGET}}" && exit 1;;
        esac
        NEW="$MAJOR.$MINOR.$PATCH"
        echo "$NEW" > {{.TAG_FILE}}
        echo "🔼 Bumped version: $CURRENT → $NEW"

  build:
    desc: Build the rejs container image
    cmds:
      - "{{.RUNTIME}} build --build-arg SITE_VERSION={{.TAG}} --build-arg VITE_SHORTENER_URL={{.SHORTENER_URL}} -t {{.IMAGE}}:{{.TAG}} ."

  healthcheck:
    desc: Run local container and check /healthz endpoint
    cmds:
      - |
        echo "🚀 Starting container {{.IMAGE}}:{{.TAG}}"
        NETWORK_OPT=$([ "{{.RUNTIME}}" = "podman" ] && echo "--network=slirp4netns" || echo "")
        CID=$({{.RUNTIME}} run -d $NETWORK_OPT -p 8081:8080 {{.IMAGE}}:{{.TAG}})
        echo "⌛ Waiting for /healthz"
        sleep 5
        if [ "$(curl --max-time 5 -fs http://localhost:8081/healthz)" = "ok" ]; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed"
          {{.RUNTIME}} logs "$CID"
          {{.RUNTIME}} stop "$CID" && {{.RUNTIME}} rm "$CID"
          exit 1
        fi
        {{.RUNTIME}} stop "$CID" && {{.RUNTIME}} rm "$CID"

  verify:
    desc: Build and verify health
    cmds:
      - task: build
      - task: healthcheck

  push:
    desc: Push the image to GHCR
    cmds:
      - |
        echo "📦 Pushing image {{.IMAGE}}:{{.TAG}}"
        {{.RUNTIME}} push {{.IMAGE}}:{{.TAG}}

  resolve-digest:
    internal: true
    cmds:
      - |
        # Resolve the digest from the REGISTRY (not the local image store): that
        # is what the cluster pulls and what Kyverno verifies. skopeo shares
        # podman's credential store (containers/auth.json), unlike crane which
        # reads ~/.docker/config.json.
        skopeo inspect --no-tags docker://{{.IMAGE}}:{{.TAG}} | jq -r .Digest > .digest

  sign:
    desc: Sign the pushed image digest with cosign (key injected from 1Password, never on disk)
    cmds:
      - task: resolve-digest
      - |
        set -euo pipefail
        DIGEST=$(cat .digest)
        echo "🔏 Signing image {{.IMAGE}}@$DIGEST"
        # cosign only reads docker-style config, and ~/.docker/config.json on
        # this machine keeps getting clobbered with a scope-less token — hand
        # cosign podman's working GHCR creds via a throwaway DOCKER_CONFIG.
        AUTH_JSON="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/containers/auth.json"
        DOCKER_CONFIG=$(mktemp -d)
        export DOCKER_CONFIG
        trap 'rm -rf "$DOCKER_CONFIG"' EXIT
        cp "$AUTH_JSON" "$DOCKER_CONFIG/config.json"
        # The three flags are LOAD-BEARING (infra docs/kyverno.md, Phase 3):
        # cosign v3 defaults to the sigstore bundle format (OCI referrers),
        # which Kyverno 1.18 cannot verify key-based. These produce the legacy
        # sha256-<digest>.sig signature its Cosign attestor reads, and keep the
        # release out of the public Rekor log (policy sets rekor.ignoreTlog).
        # Deprecated upstream — revisit at the next Kyverno upgrade.
        COSIGN_PRIVATE_KEY=$(op read "{{.OP_ITEM}}/private-key") \
        COSIGN_PASSWORD=$(op read "{{.OP_ITEM}}/password") \
          cosign sign --yes \
            --new-bundle-format=false --use-signing-config=false --tlog-upload=false \
            --key env://COSIGN_PRIVATE_KEY \
            {{.IMAGE}}@$DIGEST

  verify-signature:
    desc: Verify the pushed image's signature offline, exactly as the cluster does
    cmds:
      - task: resolve-digest
      - |
        set -euo pipefail
        DIGEST=$(cat .digest)
        AUTH_JSON="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/containers/auth.json"
        DOCKER_CONFIG=$(mktemp -d)
        export DOCKER_CONFIG
        trap 'rm -rf "$DOCKER_CONFIG"' EXIT
        cp "$AUTH_JSON" "$DOCKER_CONFIG/config.json"
        COSIGN_PUBLIC_KEY=$(op read "{{.OP_ITEM}}/public-key") \
          cosign verify --key env://COSIGN_PUBLIC_KEY \
            --insecure-ignore-tlog=true \
            {{.IMAGE}}@$DIGEST > /dev/null
        echo "✅ Signature verified for {{.IMAGE}}@$DIGEST"

  trivy:
    desc: Generate SBOM and vulnerability report with Trivy
    cmds:
      - mkdir -p ./security
      - echo "🔍 Generating SBOM with Trivy"
      - trivy image --format cyclonedx --output ./security/sbom-{{.TAG}}.json {{.IMAGE}}:{{.TAG}}
      - echo "🛡 Generating vulnerability scan report"
      - trivy image --format json --scanners vuln --output ./security/vulns-{{.TAG}}.json {{.IMAGE}}:{{.TAG}}

  commit-artifacts:
    desc: Commit .version, digest, SBOM and vuln reports to Git
    cmds:
      - |
        echo "📦 Committing version + security artifacts"
        git add .version .digest security/sbom-{{.TAG}}.json security/vulns-{{.TAG}}.json
        git commit -m "chore: release {{.TAG}}"
        git push

  release:
    desc: Full release pipeline (build, push, sign, verify, scan, commit)
    cmds:
      - task: verify
      - task: push
      - task: sign
      - task: verify-signature
      - task: trivy
      - task: commit-artifacts
      - echo ""
      - echo "✅ Released and signed {{.IMAGE}}:{{.TAG}}"
      - echo "   Bump the image tag in the infra repo (apps/rejs/deploy.yaml) to deploy via ArgoCD."
