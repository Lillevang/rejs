# rejs — static SPA served by unprivileged nginx.
# Listens on 8080 (unprivileged user cannot bind 80), SPA fallback to
# index.html, long-lived caching for hashed assets, and a /healthz probe.

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets on the fly (small static site, cheap to compress).
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # Liveness/readiness endpoint used by the Taskfile healthcheck and k8s probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Hashed build assets (Vite emits /assets/*.[hash].js|css) are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA entrypoint: never cache index.html so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # Client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/conf.d/security-headers.inc;
    }
}
