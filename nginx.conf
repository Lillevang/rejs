# rejs — static SPA served by unprivileged nginx.
# This file lands in /etc/nginx/conf.d/default.conf, which nginx includes
# inside the http block, so http-level directives are allowed here.

# Recover the client IP from X-Forwarded-For. Trusted hops: the Cilium gateway
# (Envoy) on the pod network and the Hetzner LB in front of the cluster. The LB
# speaks PROXY protocol to the gateway, so the rightmost untrusted address in
# the chain is the real client. These values mirror the infra repo (cluster pod
# CIDR and LB IP); if they drift, real_ip silently stops resolving and all
# visitors share one rate-limit bucket (site-wide 429s).
set_real_ip_from 10.244.0.0/16;
set_real_ip_from 77.42.14.189/32;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Per-client rate limit: 10 r/s sustained; burst absorbs a quick series of
# navigations/reloads (hashed assets are exempt) without delaying visitors.
limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;
limit_req_status 429;

# Default server: requests whose Host header doesn't match a known vhost get
# the connection closed without a response. Listens on 8080 because the
# unprivileged nginx user cannot bind 80.
server {
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;

    # Kubelet probes and the Taskfile healthcheck reach the container by pod
    # IP / localhost, so their Host never matches the vhost — the healthcheck
    # lives here.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    location / {
        return 444;
    }
}

server {
    listen       8080;
    listen       [::]:8080;
    server_name  rejs.lillevang.dev;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets on the fly (small static site, cheap to compress).
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # Hashed build assets (Vite emits /assets/*.[hash].js|css) are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA entrypoint: never cache index.html so new deploys are picked up.
    location = /index.html {
        limit_req zone=perip burst=30 nodelay;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # The app is a single page at /; shared plans travel in the URL fragment
    # (#plan=…) and never reach the server, so nothing needs to fall through
    # to index.html. try_files serves index.html in this location (no internal
    # redirect for non-final args), so the no-cache and security headers must
    # be repeated here.
    location = / {
        limit_req zone=perip burst=30 nodelay;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # Unknown paths get a real 404, and directories aren't resolved at all
    # (no $uri/ — a 403 would hint that /assets/ exists).
    location / {
        limit_req zone=perip burst=30 nodelay;
        try_files $uri =404;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    port_in_redirect off;
}
